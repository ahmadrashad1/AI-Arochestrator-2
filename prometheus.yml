global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'ai-orchestrator'
    static_configs:
      # Docker Compose: scrape the `app` service
      - targets: ['app:8000']
      # Local machine (if Prometheus runs on the host): uncomment the following
      # - targets: ['host.docker.internal:8000']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alert.rules.yml'

# Example alerting rules (optional):
# rule_files:
#   - 'alert.rules.yml'
