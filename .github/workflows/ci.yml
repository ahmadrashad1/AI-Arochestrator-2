name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate alembic migrations
        env:
          DATABASE_URL: sqlite:///./ci_migrations.db
        run: |
          cd backend
          alembic upgrade head
      - name: Run backend tests
        working-directory: backend
        run: |
          python -m pytest -q
      - name: Run container-metrics integration test
        working-directory: backend
        run: |
          python -m pytest app/tests/integration/test_container_metrics_emitted.py -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm ci
      - name: Lint frontend
        working-directory: frontend
        run: |
          npm run lint
      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

  integration-redis-celery:
    runs-on: ubuntu-latest
    needs: backend-tests
    services:
      redis:
        image: redis:6
        ports:
          - 6379:6379
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Start Celery worker
        working-directory: backend
        run: |
          nohup python -m celery -A app.workers.celery_worker worker --loglevel=info --concurrency=1 &
          sleep 5
      - name: Run redis + celery integration tests
        working-directory: backend
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest -q
